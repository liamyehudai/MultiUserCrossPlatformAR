<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Static, marker-based co-located Shared AR web application with time-based deterministic animation synchronization using Babylon.js WebXR.">
    <title>Co-Located Shared AR — Babylon.js WebXR</title>
    
    <!-- External Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Babylon.js CDN Dependencies -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
</head>
<body>
    <!-- Main WebGL / WebXR Render Canvas -->
    <canvas id="renderCanvas"></canvas>

    <!-- Overlay & Fallback UI Container -->
    <div id="uiContainer" class="ui-container">
        <!-- Rendered dynamically by app.js based on platform capabilities and AR state -->
    </div>

    <!-- Main JavaScript Logic -->
    <script src="app.js"></script>
</body>
</html>
